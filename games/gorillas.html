<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorillas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Segoe UI',Tahoma,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#fff;}
body.embed .game-window{border:none;box-shadow:none;}
body.embed .titlebar{display:none;}
body.embed{min-height:auto;}
.game-window{background:#000;}
.titlebar{background:linear-gradient(180deg,#0054e3,#0f6cfc);color:#fff;padding:4px 6px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;text-shadow:0 1px 1px rgba(0,0,0,.4);border-radius:6px 6px 0 0;}
.titlebar-btns{display:flex;gap:2px;}
.titlebar-btn{width:21px;height:21px;border-radius:3px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:default;}
.btn-close{background:linear-gradient(180deg,#e47c6c,#c9473b);border-color:#c04535;color:#fff;}
.btn-other{background:linear-gradient(180deg,#3c8bea,#2663c7);border-color:#3573d6;color:#fff;}
canvas{display:block;}
.controls{padding:8px 12px;display:flex;gap:12px;align-items:center;font-size:13px;background:#222;}
.controls label{color:#aaa;}
.controls input{width:60px;padding:2px 4px;background:#333;color:#fff;border:1px solid #555;font-size:13px;text-align:center;}
.controls button{padding:4px 16px;background:#c0c0c0;color:#000;border:2px solid;border-color:#fff #808080 #808080 #fff;cursor:pointer;font-size:13px;font-family:inherit;}
.controls button:active{border-color:#808080 #fff #fff #808080;}
.info{padding:4px 12px;font-size:12px;color:#ff0;background:#000;text-align:center;}
</style>
</head>
<body>
<div class="game-window">
  <div class="titlebar"><span>🍌 Gorillas</span><div class="titlebar-btns"><span class="titlebar-btn btn-other">─</span><span class="titlebar-btn btn-other">□</span><span class="titlebar-btn btn-close" onclick="window.close()">×</span></div></div>
  <div class="info" id="info">Player 1's turn — Set angle and velocity, then Fire!</div>
  <canvas id="c" width="640" height="360"></canvas>
  <div class="controls">
    <label>Angle: <input id="angle" type="number" value="60" min="0" max="90"></label>
    <label>Velocity: <input id="vel" type="number" value="50" min="1" max="100"></label>
    <button onclick="fire()">Fire!</button>
    <button onclick="newGame()">New Game</button>
    <span style="margin-left:auto;color:#aaa;font-size:12px;" id="scores">P1: 0 | P2: 0</span>
  </div>
</div>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W=640,H=360,GRAVITY=0.15;
var buildings,g1,g2,turn,animating,banana,trail,wind,s1=0,s2=0;

function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function genBuildings(){
  buildings=[];var x=0;
  while(x<W){
    var w=randInt(30,60),h=randInt(80,250);
    var color=['#808080','#a0522d','#4682b4','#696969','#8b7355'][randInt(0,4)];
    buildings.push({x:x,y:H-h,w:w,h:h,color:color});
    x+=w+2;
  }
}

function placeGorillas(){
  var b1=buildings[randInt(1,3)],b2=buildings[buildings.length-randInt(2,4)];
  g1={x:b1.x+b1.w/2,y:b1.y-20};
  g2={x:b2.x+b2.w/2,y:b2.y-20};
}

function drawScene(){
  // Sky
  ctx.fillStyle='#000033';ctx.fillRect(0,0,W,H);
  // Stars
  for(var i=0;i<30;i++){ctx.fillStyle='#fff';ctx.fillRect(randInt(0,W),randInt(0,H/2),1,1);}
  // Sun
  ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(W/2,40,20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.fillRect(W/2-6,33,4,3);ctx.fillRect(W/2+3,33,4,3);ctx.fillRect(W/2-4,42,9,2);
  // Buildings
  buildings.forEach(function(b){
    ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);
    // Windows
    ctx.fillStyle='#ffff00';
    for(var wy=b.y+6;wy<H-10;wy+=14){for(var wx=b.x+4;wx<b.x+b.w-6;wx+=10){
      if(Math.random()>0.3)ctx.fillRect(wx,wy,5,8);
    }}
  });
  // Gorillas
  drawGorilla(g1.x,g1.y,'#8b4513');
  drawGorilla(g2.x,g2.y,'#8b4513');
  // Wind indicator
  ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('Wind: '+(wind>0?'→':'←')+' '+Math.abs(wind).toFixed(1),W/2,15);
  // Trail
  trail.forEach(function(t){ctx.fillStyle='rgba(255,255,0,0.3)';ctx.fillRect(t[0]-1,t[1]-1,3,3);});
}

function drawGorilla(x,y,color){
  ctx.fillStyle=color;
  ctx.fillRect(x-8,y,16,18); // body
  ctx.fillRect(x-5,y-8,10,10); // head
  ctx.fillRect(x-14,y+2,6,10); // left arm
  ctx.fillRect(x+8,y+2,6,10); // right arm
  ctx.fillRect(x-6,y+18,5,6); // left leg
  ctx.fillRect(x+1,y+18,5,6); // right leg
  // Eyes
  ctx.fillStyle='#fff';ctx.fillRect(x-3,y-5,3,3);ctx.fillRect(x+1,y-5,3,3);
  ctx.fillStyle='#000';ctx.fillRect(x-2,y-4,2,2);ctx.fillRect(x+2,y-4,2,2);
}

function fire(){
  if(animating)return;
  var angle=parseFloat(document.getElementById('angle').value)||45;
  var vel=parseFloat(document.getElementById('vel').value)||50;
  var rad=angle*Math.PI/180;
  var src=turn===1?g1:g2;
  var dir=turn===1?1:-1;
  var vx=Math.cos(rad)*vel*0.4*dir;
  var vy=-Math.sin(rad)*vel*0.4;
  banana={x:src.x,y:src.y-10,vx:vx,vy:vy};
  trail=[];animating=true;
  document.getElementById('info').textContent='🍌 Banana in flight...';
  animBanana();
}

function animBanana(){
  if(!animating)return;
  banana.vx+=wind*0.01;
  banana.vy+=GRAVITY;
  banana.x+=banana.vx;banana.y+=banana.vy;
  trail.push([banana.x,banana.y]);
  // Check hit gorilla
  var target=turn===1?g2:g1;
  if(Math.abs(banana.x-target.x)<12&&Math.abs(banana.y-target.y)<15){
    animating=false;
    if(turn===1)s1++;else s2++;
    document.getElementById('scores').textContent='P1: '+s1+' | P2: '+s2;
    document.getElementById('info').textContent='💥 Player '+turn+' hits! Click New Game.';
    explosion(target.x,target.y);return;
  }
  // Check hit building
  for(var i=0;i<buildings.length;i++){
    var b=buildings[i];
    if(banana.x>=b.x&&banana.x<=b.x+b.w&&banana.y>=b.y&&banana.y<=H){
      animating=false;
      explosion(banana.x,banana.y);
      // Damage building
      b.y+=20;b.h-=20;if(b.h<10)buildings.splice(i,1);
      turn=turn===1?2:1;
      document.getElementById('info').textContent='Player '+turn+"'s turn";
      return;
    }
  }
  // Out of bounds
  if(banana.x<-20||banana.x>W+20||banana.y>H+20){
    animating=false;turn=turn===1?2:1;
    document.getElementById('info').textContent='Miss! Player '+turn+"'s turn";
    drawScene();return;
  }
  drawScene();
  ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(banana.x,banana.y,4,0,Math.PI*2);ctx.fill();
  requestAnimationFrame(animBanana);
}

function explosion(x,y){
  var frame=0;
  function boom(){
    drawScene();
    ctx.fillStyle='rgba(255,'+(150-frame*5)+',0,'+(1-frame/20)+')';
    ctx.beginPath();ctx.arc(x,y,frame*3,0,Math.PI*2);ctx.fill();
    frame++;
    if(frame<20)requestAnimationFrame(boom);
  }
  boom();
}

function newGame(){
  turn=1;animating=false;trail=[];
  wind=(Math.random()-0.5)*4;
  genBuildings();placeGorillas();drawScene();
  document.getElementById('info').textContent="Player 1's turn — Set angle and velocity, then Fire!";
}

if(location.search.indexOf('embed')!==-1)document.body.classList.add('embed');
newGame();
</script>
</body>
</html>
