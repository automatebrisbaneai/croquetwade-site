<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#c0c0c0; font-family:'Segoe UI',Tahoma,sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; }

.game-window {
  border:2px solid; border-color:#fff #0a0a0a #0a0a0a #fff;
  box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #808080;
  background:#c0c0c0;
}

.titlebar {
  background:linear-gradient(180deg,#0054e3,#0f6cfc);
  color:#fff; padding:4px 6px; display:flex; align-items:center; justify-content:space-between;
  font-size:13px; font-weight:600; text-shadow:0 1px 1px rgba(0,0,0,.4);
  border-radius:6px 6px 0 0;
}
.titlebar-btns { display:flex; gap:2px; }
.titlebar-btn { width:21px; height:21px; border-radius:3px; border:1px solid; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; cursor:default; }
.btn-close { background:linear-gradient(180deg,#e47c6c,#c9473b); border-color:#c04535; color:#fff; }
.btn-other { background:linear-gradient(180deg,#3c8bea,#2663c7); border-color:#3573d6; color:#fff; }

.game-area { padding:6px; }

.header {
  border:2px solid; border-color:#808080 #fff #fff #808080;
  padding:4px 8px; display:flex; justify-content:space-between; align-items:center;
  margin-bottom:6px; background:#c0c0c0; font-size:13px;
}

.score {
  background:#000; color:#0f0; font-family:'VT323','Courier New',monospace;
  font-size:24px; padding:2px 8px; min-width:60px; text-align:right;
  border:1px solid; border-color:#808080 #fff #fff #808080;
}

.speed-label { font-size:11px; color:#444; }

canvas {
  border:3px solid; border-color:#808080 #fff #fff #808080;
  display:block; background:#000;
}

.controls { padding:6px; font-size:11px; color:#555; text-align:center; }

.overlay {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85); color:#0f0; padding:20px 30px; text-align:center;
  font-family:'VT323',monospace; font-size:24px; border:2px solid #0f0;
  pointer-events:none;
}
.overlay.hidden { display:none; }

.canvas-wrap { position:relative; display:inline-block; }

.new-game-btn {
  padding:3px 14px; font-size:12px; cursor:pointer; margin-top:4px;
  border:2px solid; border-color:#fff #808080 #808080 #fff;
  background:#c0c0c0; font-family:inherit;
}
.new-game-btn:active { border-color:#808080 #fff #fff #808080; }
</style>
</head>
<body>
<div class="game-window">
  <div class="titlebar">
    <span>🐍 Snake</span>
    <div class="titlebar-btns">
      <span class="titlebar-btn btn-other">─</span>
      <span class="titlebar-btn btn-other">□</span>
      <span class="titlebar-btn btn-close" onclick="window.close()">×</span>
    </div>
  </div>
  <div class="game-area">
    <div class="header">
      <div>Score: <span class="score" id="score">0</span></div>
      <div>High: <span class="score" id="high">0</span></div>
      <button class="new-game-btn" onclick="startGame()">New Game</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <div id="overlay-text">Press any arrow key<br>or click New Game</div>
      </div>
    </div>
    <div class="controls">Arrow keys to move · Don't hit the walls or yourself</div>
  </div>
</div>

<script>
var canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d');
var GRID=20, CELL=canvas.width/GRID;
var snake, dir, nextDir, food, score, high=0, gameLoop, running=false;

function startGame() {
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; placeFood();
  document.getElementById('score').textContent='0';
  document.getElementById('overlay').classList.add('hidden');
  running=true;
  clearInterval(gameLoop);
  gameLoop=setInterval(tick,120);
}

function placeFood() {
  do { food={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)}; }
  while(snake.some(function(s){return s.x===food.x&&s.y===food.y}));
}

function tick() {
  dir=nextDir;
  var head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};

  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(function(s){return s.x===head.x&&s.y===head.y})) {
    clearInterval(gameLoop); running=false;
    if(score>high) { high=score; document.getElementById('high').textContent=high; }
    document.getElementById('overlay-text').innerHTML='GAME OVER<br>Score: '+score+'<br><span style="font-size:16px">Press arrow key to restart</span>';
    document.getElementById('overlay').classList.remove('hidden');
    return;
  }

  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y) {
    score+=10; document.getElementById('score').textContent=score;
    placeFood();
  } else { snake.pop(); }

  draw();
}

function draw() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid lines
  ctx.strokeStyle='#111'; ctx.lineWidth=0.5;
  for(var i=0;i<=GRID;i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
  }

  // Snake
  snake.forEach(function(s,i) {
    ctx.fillStyle=i===0?'#4caf50':'#66bb6a';
    ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);
    if(i===0) {
      ctx.fillStyle='#fff';
      var ex=dir.x===1?14:dir.x===-1?4:dir.y===0?9:9;
      var ey=dir.y===1?14:dir.y===-1?4:dir.x===0?9:9;
      ctx.fillRect(s.x*CELL+ex-1,s.y*CELL+ey-1,3,3);
    }
  });

  // Food
  ctx.fillStyle='#f44336';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#4caf50';
  ctx.fillRect(food.x*CELL+CELL/2-1, food.y*CELL+1, 2, 4);
}

document.addEventListener('keydown',function(e) {
  var map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if(!map[e.key]) return;
  e.preventDefault();
  if(!running) { startGame(); return; }
  var d=map[e.key];
  if(d.x!==-dir.x||d.y!==-dir.y) nextDir=d;
});

// Initial draw
ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
draw=function(){};
snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}]; dir={x:1,y:0};
(function(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#111'; ctx.lineWidth=0.5;
  for(var i=0;i<=GRID;i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
  }
})();
draw=function draw2() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#111'; ctx.lineWidth=0.5;
  for(var i=0;i<=GRID;i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
  }
  snake.forEach(function(s,i) {
    ctx.fillStyle=i===0?'#4caf50':'#66bb6a';
    ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);
  });
  if(food) {
    ctx.fillStyle='#f44336';
    ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2); ctx.fill();
  }
};
</script>
</body>
</html>
